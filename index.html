<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JIMON Group</title>
  <script>
    (function () {
      var path = window.location.pathname.replace(/\/$/, '');
      if (/^\/(en|ru|kk|ky|uz)(\/[^.]*)?$/.test(path)) {
        window.location.replace(path + '/index.html' + window.location.search + window.location.hash);
        return;
      }
      window.location.replace('/ru/index.html');
    })();
  </script>
</head>
<body>
  <p><a href="/ru/index.html">Перейти на сайт</a></p>
</body>
</html>
